<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bedtime Story Test</title>
  </head>
  <body>
    <h2>Bedtime Story API Test</h2>

    <label>
      Topic:
      <input
        id="topic"
        value="Dinosaurs"
      />
    </label>

    <br /><br />

    <label>
      Mood:
      <input
        id="mood"
        value="Calm"
      />
    </label>

    <br /><br />

    <label>
      Narrator:

      <select id="narratorType">
        <option value="adaptive">Adaptive</option>

        <option value="default">Default</option>

        <option value="warm">Warm</option>

        <option value="soft">Soft</option>

        <option value="deep">Deep</option>
      </select>
    </label>

    <br /><br />

    <label>
      Length:
      <select id="length">
        <option value="short">Short</option>
        <option value="medium">Medium</option>
        <option value="long">Long</option>
      </select>
    </label>

    <br /><br />

    <button id="generate">Generate Story</button>

    <br /><br />

    <h3 id="title"></h3>
    <p id="story"></p>
    <p id="duration"></p>

    <audio
      id="player"
      controls
    ></audio>

    <script>
      document.getElementById("generate").onclick = async () => {
        const topic = document.getElementById("topic").value;
        const mood = document.getElementById("mood").value;
        const narratorType = document.getElementById("narratorType").value;
        const length = document.getElementById("length").value;

        const button = document.getElementById("generate");
        const player = document.getElementById("player");

        button.disabled = true;
        button.textContent = "Generating...";

        try {
          const res = await fetch("http://localhost:3000/stories/generate", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              topic,
              mood,
              narratorType,
              length,
            }),
          });

          if (!res.ok) {
            throw new Error(await res.text());
          }

          const data = await res.json();

          document.getElementById("title").textContent = data.title;
          document.getElementById("story").textContent = data.story;
          document.getElementById("duration").textContent =
            `Duration: ${data.durationSeconds} seconds`;

          player.src = data.audioUrl;
          await player.play();
        } catch (err) {
          console.error(err);
          alert(err instanceof Error ? err.message : "Something went wrong");
        } finally {
          button.disabled = false;
          button.textContent = "Generate Story";
        }
      };
    </script>
  </body>
</html>
