<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bedtime Story Test</title>
</head>
<body>
    <h2>Bedtime Story API Test</h2>

    <label>
        Topic:
        <input id="topic" value="Dinosaurs">
    </label>

    <br><br>

    <label>
        Mood:
        <input id="mood" value="Calm">
    </label>

    <br><br>

    <label>
        Length:
        <input id="length" value="short">
    </label>

    <br><br>

    <button id="generate">Generate Story</button>

    <br><br>

    <audio id="player" controls></audio>

    <script>
        document.getElementById("generate").onclick = async () => {
            const topic = document.getElementById("topic").value;
            const mood = document.getElementById("mood").value;
            const length = document.getElementById("length").value;

            const button = document.getElementById("generate");
            button.disabled = true;
            button.textContent = "Generating...";

            try {
                const res = await fetch("http://localhost:3000/stories/generate", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        topic,
                        mood,
                        length,
                    }),
                });

                if (!res.ok) {
                    throw new Error(await res.text());
                }

                const blob = await res.blob();

                const url = URL.createObjectURL(blob);

                const player = document.getElementById("player");
                player.src = url;
                player.play();

            } catch (err) {
                console.error(err);
                alert(err.message);
            } finally {
                button.disabled = false;
                button.textContent = "Generate Story";
            }
        };
    </script>
</body>
</html>
